<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | The Hardware Manual</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="article-page">
    <div class="article-content">
        <div class="article-nav">
            <a href="index.html" class="back-link">← Back to Home</a>
        </div>

        <header class="article-header">
            <h1>Contact The Hardware Manual</h1>
            <p class="article-meta">Support & Inquiries</p>
        </header>

        <section class="body-text">
            <p>Have a question about a specific PS5 Pro upgrade or need help troubleshooting your gear? Send us a message and we'll get back to you as soon as possible.</p>

            <!-- Formspree Integration -->
            <form action="https://formspree.io/f/your_unique_id" method="POST" class="contact-form">
                <div class="input-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required placeholder="Your Name">
                </div>

                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required placeholder="Your Email Address">
                </div>

                <div class="input-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="8" required placeholder="How can we help you today?"></textarea>
                </div>

                <!-- Spam protection -->
                <input type="text" name="_gotcha" style="display:none">

                <button type="submit" class="amazon-button">Send Message</button>
            </form>
        </section>
    </div>

    <footer>
        <p>&copy; 2026 The Hardware Manual. All rights reserved.</p>
    </footer>
</body>
</html>
