<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>How to Enable 120Hz | The Hardware Manual</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body class="article-page">
    <div class="article-content">
        <a href="../index.html" class="back-link">← Back to Home</a>
        <header class="article-header">
            <h1>How to Enable 120Hz on PS5</h1>
            <p class="article-meta">Tutorial | April 2026</p>
        </header>
        <img src="../images/120hz-setup.jpg" class="featured-image" alt="120Hz Settings">
        <div class="highlight-box">
            <strong>Check First:</strong> Ensure your monitor supports 120Hz and you are using an HDMI 2.1 cable.
        </div>
        <section class="body-text">
            <h2>Step-by-Step Instructions</h2>
            <ol>
                <li>Go to <strong>Settings</strong> > <strong>Screen and Video</strong>.</li>
                <li>Select <strong>Video Output</strong>.</li>
                <li>Set <strong>Enable 120Hz Output</strong> to Automatic.</li>
            </ol>
        </section>
    </div>
</body>
